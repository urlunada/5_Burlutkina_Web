<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Коллекция карт</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>ManaVault</h1>
      <button id="editModeToggle" class="edit-button" type="button">
        Редактирование
      </button>
    </header>

    <main id="mainContent"></main>
    <div id="addCardModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>➕ Добавить новую карту</h2>
          <button class="modal-close" type="button" id="modalCloseBtn">
            ✕
          </button>
        </div>

        <form id="addCardForm" class="modal-form">
          <div class="form-group">
            <label for="newCardName">Название карты</label>
            <input
              type="text"
              id="newCardName"
              placeholder="Введите название"
              required
            />
          </div>

          <div class="form-group">
            <label for="newCardType">Тип карты</label>
            <select id="newCardType" required>
              <option value="" disabled selected>Выберите тип</option>
              <option value="attack">⚔️ Атака</option>
              <option value="defense">🛡️ Защита</option>
              <option value="special">✨ Специальная</option>
            </select>
          </div>

          <div class="form-group">
            <label for="newCardDesc">Описание</label>
            <textarea
              id="newCardDesc"
              placeholder="Введите описание"
              rows="3"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="newCardImage">Изображение (путь к файлу)</label>
            <input
              type="text"
              id="newCardImage"
              placeholder="images/картинка.png"
              value="images/new-card.png"
            />
          </div>

          <div class="modal-buttons">
            <button type="submit" class="btn-save">💾 Создать</button>
            <button type="button" class="btn-cancel" id="modalCancelBtn">
              ✖️ Отмена
            </button>
          </div>
        </form>
      </div>
    </div>
    <script src="js/Card.js"></script>
    <script src="js/AttackCard.js"></script>
    <script src="js/DefenseCard.js"></script>
    <script src="js/SpecialCard.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
